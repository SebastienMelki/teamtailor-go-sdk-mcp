openapi: 3.1.0
info:
    title: TeamtailorService API
    version: 1.0.0
paths:
    /v1/candidates:
        get:
            tags:
                - TeamtailorService
            summary: ListCandidates
            description: |-
                ListCandidates returns a paginated list of candidates.
                 GET /v1/candidates
            operationId: ListCandidates
            parameters:
                - name: Authorization
                  in: header
                  description: Token token=<API_KEY> — Teamtailor API key, set by the Go wrapper.
                  required: true
                  schema:
                    type: string
                    example: Token token=ABC123
                - name: X-Api-Version
                  in: header
                  description: Dated API version (YYYYMMDD). Defaults to 20240904 in the Go wrapper.
                  required: true
                  schema:
                    type: string
                    example: 20240904
                - name: Accept
                  in: header
                  description: application/vnd.api+json — JSON:API accept type. Set by the Go wrapper.
                  required: true
                  schema:
                    type: string
                    example: application/vnd.api+json
                - name: page[size]
                  in: query
                  description: Number of records per page (Teamtailor caps at 30).
                  required: false
                  schema:
                    type: integer
                    format: int32
                - name: page[after]
                  in: query
                  description: Cursor for the next page (opaque token returned in `links.next`).
                  required: false
                  schema:
                    type: string
                - name: page[before]
                  in: query
                  description: Cursor for the previous page (opaque token returned in `links.prev`).
                  required: false
                  schema:
                    type: string
                - name: filter[email]
                  in: query
                  description: Filter candidates by exact email match.
                  required: false
                  schema:
                    type: string
                - name: filter[division]
                  in: query
                  description: Filter candidates by division id.
                  required: false
                  schema:
                    type: string
                - name: filter[department]
                  in: query
                  description: Filter candidates by department id.
                  required: false
                  schema:
                    type: string
                - name: filter[role]
                  in: query
                  description: Filter candidates by role id.
                  required: false
                  schema:
                    type: string
                - name: filter[locations]
                  in: query
                  description: Filter candidates by location id (comma-separated for multiple).
                  required: false
                  schema:
                    type: string
                - name: filter[regions]
                  in: query
                  description: Filter candidates by region id (comma-separated for multiple).
                  required: false
                  schema:
                    type: string
                - name: filter[created-at][from]
                  in: query
                  description: Filter candidates created after this RFC 3339 timestamp.
                  required: false
                  schema:
                    type: string
                - name: filter[created-at][to]
                  in: query
                  description: Filter candidates created before this RFC 3339 timestamp.
                  required: false
                  schema:
                    type: string
                - name: filter[updated-at][from]
                  in: query
                  description: Filter candidates updated after this RFC 3339 timestamp.
                  required: false
                  schema:
                    type: string
                - name: filter[updated-at][to]
                  in: query
                  description: Filter candidates updated before this RFC 3339 timestamp.
                  required: false
                  schema:
                    type: string
                - name: filter[connected]
                  in: query
                  description: Filter by connected status ("true" or "false").
                  required: false
                  schema:
                    type: string
                - name: filter[phone]
                  in: query
                  description: Filter by phone number (6-14 chars, may include `+`).
                  required: false
                  schema:
                    type: string
                - name: include
                  in: query
                  description: Comma-separated relationships to sideload, e.g. "department,locations,job-applications,job-applications.stage".
                  required: false
                  schema:
                    type: string
                - name: sort
                  in: query
                  description: Sort order, e.g. "id" (default ascending) or "-id" (descending). Accepts any candidate attribute.
                  required: false
                  schema:
                    type: string
                - name: fields[candidates]
                  in: query
                  description: 'Sparse fieldset: comma-separated attribute names to return on candidates.'
                  required: false
                  schema:
                    type: string
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ListCandidatesResponse'
                "400":
                    description: Validation error
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ValidationError'
                default:
                    description: Error response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /v1/candidates/{id}:
        get:
            tags:
                - TeamtailorService
            summary: GetCandidate
            description: |-
                GetCandidate returns a single candidate (with attributes such as
                 `resume`, `original-resume`, and `resume_summary`) and lets callers
                 sideload status via `include=job-applications,job-applications.stage`.
                 GET /v1/candidates/{id}
            operationId: GetCandidate
            parameters:
                - name: Authorization
                  in: header
                  description: Token token=<API_KEY> — Teamtailor API key, set by the Go wrapper.
                  required: true
                  schema:
                    type: string
                    example: Token token=ABC123
                - name: X-Api-Version
                  in: header
                  description: Dated API version (YYYYMMDD). Defaults to 20240904 in the Go wrapper.
                  required: true
                  schema:
                    type: string
                    example: 20240904
                - name: Accept
                  in: header
                  description: application/vnd.api+json — JSON:API accept type. Set by the Go wrapper.
                  required: true
                  schema:
                    type: string
                    example: application/vnd.api+json
                - name: id
                  in: path
                  description: The candidate's id (path parameter).
                  required: true
                  schema:
                    type: string
                - name: include
                  in: query
                  description: |-
                    Comma-separated relationships to sideload — useful for pulling status
                     and resume context in one round-trip, e.g.
                     `job-applications,job-applications.stage,uploads`.
                  required: false
                  schema:
                    type: string
                - name: fields[candidates]
                  in: query
                  description: 'Sparse fieldset: comma-separated attribute names to return on candidates.'
                  required: false
                  schema:
                    type: string
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/GetCandidateResponse'
                "400":
                    description: Validation error
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ValidationError'
                default:
                    description: Error response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /v1/job-applications:
        get:
            tags:
                - TeamtailorService
            summary: ListJobApplications
            description: |-
                ListJobApplications returns a paginated list of job applications, each
                 carrying a candidate's status on one job (current stage, rejected-at).
                 GET /v1/job-applications
            operationId: ListJobApplications
            parameters:
                - name: Authorization
                  in: header
                  description: Token token=<API_KEY> — Teamtailor API key, set by the Go wrapper.
                  required: true
                  schema:
                    type: string
                    example: Token token=ABC123
                - name: X-Api-Version
                  in: header
                  description: Dated API version (YYYYMMDD). Defaults to 20240904 in the Go wrapper.
                  required: true
                  schema:
                    type: string
                    example: 20240904
                - name: Accept
                  in: header
                  description: application/vnd.api+json — JSON:API accept type. Set by the Go wrapper.
                  required: true
                  schema:
                    type: string
                    example: application/vnd.api+json
                - name: page[size]
                  in: query
                  description: Number of records per page (Teamtailor caps at 30).
                  required: false
                  schema:
                    type: integer
                    format: int32
                - name: page[number]
                  in: query
                  description: 1-based page number (Teamtailor uses page-number pagination on this endpoint).
                  required: false
                  schema:
                    type: integer
                    format: int32
                - name: filter[stage-type]
                  in: query
                  description: 'Filter by current stage type: "Inbox", "In process", or "Hired".'
                  required: false
                  schema:
                    type: string
                - name: filter[job]
                  in: query
                  description: |-
                    Filter applications to a single job (position) id. Not in the Postman
                     table but follows the JSON:API convention used by `filter[job]` on
                     /v1/stages and /v1/uploads.
                  required: false
                  schema:
                    type: string
                - name: filter[candidate]
                  in: query
                  description: Filter applications by candidate id.
                  required: false
                  schema:
                    type: string
                - name: filter[created-at][from]
                  in: query
                  description: Filter applications created after this RFC 3339 timestamp.
                  required: false
                  schema:
                    type: string
                - name: filter[created-at][to]
                  in: query
                  description: Filter applications created before this RFC 3339 timestamp.
                  required: false
                  schema:
                    type: string
                - name: filter[updated-at][from]
                  in: query
                  description: Filter applications updated after this RFC 3339 timestamp.
                  required: false
                  schema:
                    type: string
                - name: filter[updated-at][to]
                  in: query
                  description: Filter applications updated before this RFC 3339 timestamp.
                  required: false
                  schema:
                    type: string
                - name: filter[changed-stage-at][from]
                  in: query
                  description: Filter applications whose `changed-stage-at` is newer than this RFC 3339 timestamp.
                  required: false
                  schema:
                    type: string
                - name: filter[changed-stage-at][to]
                  in: query
                  description: Filter applications whose `changed-stage-at` is older than this RFC 3339 timestamp.
                  required: false
                  schema:
                    type: string
                - name: include
                  in: query
                  description: Comma-separated relationships to sideload, e.g. "stage,candidate,job,reject-reason".
                  required: false
                  schema:
                    type: string
                - name: sort
                  in: query
                  description: Sort order, e.g. "-changed-stage-at" for latest-moved first.
                  required: false
                  schema:
                    type: string
                - name: fields[job-applications]
                  in: query
                  description: 'Sparse fieldset: comma-separated attribute names to return on job-applications.'
                  required: false
                  schema:
                    type: string
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ListJobApplicationsResponse'
                "400":
                    description: Validation error
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ValidationError'
                default:
                    description: Error response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /v1/job-applications/{id}:
        get:
            tags:
                - TeamtailorService
            summary: GetJobApplication
            description: |-
                GetJobApplication returns a single job application.
                 GET /v1/job-applications/{id}
            operationId: GetJobApplication
            parameters:
                - name: Authorization
                  in: header
                  description: Token token=<API_KEY> — Teamtailor API key, set by the Go wrapper.
                  required: true
                  schema:
                    type: string
                    example: Token token=ABC123
                - name: X-Api-Version
                  in: header
                  description: Dated API version (YYYYMMDD). Defaults to 20240904 in the Go wrapper.
                  required: true
                  schema:
                    type: string
                    example: 20240904
                - name: Accept
                  in: header
                  description: application/vnd.api+json — JSON:API accept type. Set by the Go wrapper.
                  required: true
                  schema:
                    type: string
                    example: application/vnd.api+json
                - name: id
                  in: path
                  description: The job application's id (path parameter).
                  required: true
                  schema:
                    type: string
                - name: include
                  in: query
                  description: Comma-separated relationships to sideload, e.g. "stage,candidate,job".
                  required: false
                  schema:
                    type: string
                - name: fields[job-applications]
                  in: query
                  description: Sparse fieldset for the primary resource.
                  required: false
                  schema:
                    type: string
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/GetJobApplicationResponse'
                "400":
                    description: Validation error
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ValidationError'
                default:
                    description: Error response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /v1/stages:
        get:
            tags:
                - TeamtailorService
            summary: ListStages
            description: |-
                ListStages returns the pipeline stages — pair with `filter[job]` to scope
                 to a single job's pipeline. Resolves a job application's `stage`
                 relationship to a human-readable status name.
                 GET /v1/stages
            operationId: ListStages
            parameters:
                - name: Authorization
                  in: header
                  description: Token token=<API_KEY> — Teamtailor API key, set by the Go wrapper.
                  required: true
                  schema:
                    type: string
                    example: Token token=ABC123
                - name: X-Api-Version
                  in: header
                  description: Dated API version (YYYYMMDD). Defaults to 20240904 in the Go wrapper.
                  required: true
                  schema:
                    type: string
                    example: 20240904
                - name: Accept
                  in: header
                  description: application/vnd.api+json — JSON:API accept type. Set by the Go wrapper.
                  required: true
                  schema:
                    type: string
                    example: application/vnd.api+json
                - name: page[size]
                  in: query
                  description: Number of records per page (Teamtailor caps at 30).
                  required: false
                  schema:
                    type: integer
                    format: int32
                - name: page[number]
                  in: query
                  description: 1-based page number (Teamtailor uses page-number pagination on this endpoint).
                  required: false
                  schema:
                    type: integer
                    format: int32
                - name: filter[job]
                  in: query
                  description: Filter stages to those belonging to a specific job.
                  required: false
                  schema:
                    type: string
                - name: filter[stage-type]
                  in: query
                  description: Filter stages by stage-type id.
                  required: false
                  schema:
                    type: string
                - name: include
                  in: query
                  description: Comma-separated relationships to sideload, e.g. "job-applications,stage-type".
                  required: false
                  schema:
                    type: string
                - name: sort
                  in: query
                  description: |-
                    Sort order. Use `row-order` when scoped to a single job to match the
                     Teamtailor pipeline ordering.
                  required: false
                  schema:
                    type: string
                - name: fields[stages]
                  in: query
                  description: 'Sparse fieldset: comma-separated attribute names to return on stages.'
                  required: false
                  schema:
                    type: string
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ListStagesResponse'
                "400":
                    description: Validation error
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ValidationError'
                default:
                    description: Error response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /v1/stages/{id}:
        get:
            tags:
                - TeamtailorService
            summary: GetStage
            description: |-
                GetStage returns a single stage.
                 GET /v1/stages/{id}
            operationId: GetStage
            parameters:
                - name: Authorization
                  in: header
                  description: Token token=<API_KEY> — Teamtailor API key, set by the Go wrapper.
                  required: true
                  schema:
                    type: string
                    example: Token token=ABC123
                - name: X-Api-Version
                  in: header
                  description: Dated API version (YYYYMMDD). Defaults to 20240904 in the Go wrapper.
                  required: true
                  schema:
                    type: string
                    example: 20240904
                - name: Accept
                  in: header
                  description: application/vnd.api+json — JSON:API accept type. Set by the Go wrapper.
                  required: true
                  schema:
                    type: string
                    example: application/vnd.api+json
                - name: id
                  in: path
                  description: The stage's id (path parameter).
                  required: true
                  schema:
                    type: string
                - name: include
                  in: query
                  description: Comma-separated relationships to sideload, e.g. "job-applications".
                  required: false
                  schema:
                    type: string
                - name: fields[stages]
                  in: query
                  description: Sparse fieldset for the stage resource.
                  required: false
                  schema:
                    type: string
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/GetStageResponse'
                "400":
                    description: Validation error
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ValidationError'
                default:
                    description: Error response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
components:
    schemas:
        Error:
            type: object
            properties:
                message:
                    type: string
                    description: Error message (e.g., 'user not found', 'database connection failed')
            description: Error is returned when a handler encounters an error. It contains a simple error message that the developer can customize.
        FieldViolation:
            type: object
            properties:
                field:
                    type: string
                    description: The field path that failed validation (e.g., 'user.email' for nested fields). For header validation, this will be the header name (e.g., 'X-API-Key')
                description:
                    type: string
                    description: Human-readable description of the validation violation (e.g., 'must be a valid email address', 'required field missing')
            required:
                - field
                - description
            description: FieldViolation describes a single validation error for a specific field.
        ValidationError:
            type: object
            properties:
                violations:
                    type: array
                    items:
                        $ref: '#/components/schemas/FieldViolation'
                    description: List of validation violations
            required:
                - violations
            description: ValidationError is returned when request validation fails. It contains a list of field violations describing what went wrong.
        ListCandidatesRequest:
            type: object
            properties:
                pageSize:
                    type: integer
                    examples:
                        - 10
                    format: int32
                    description: Number of records per page (Teamtailor caps at 30).
                    example: 10
                pageAfter:
                    type: string
                    description: Cursor for the next page (opaque token returned in `links.next`).
                pageBefore:
                    type: string
                    description: Cursor for the previous page (opaque token returned in `links.prev`).
                filterEmail:
                    type: string
                    examples:
                        - jane.doe@example.com
                    description: Filter candidates by exact email match.
                    example: jane.doe@example.com
                filterDivision:
                    type: string
                    description: Filter candidates by division id.
                filterDepartment:
                    type: string
                    description: Filter candidates by department id.
                filterRole:
                    type: string
                    description: Filter candidates by role id.
                filterLocations:
                    type: string
                    description: Filter candidates by location id (comma-separated for multiple).
                filterRegions:
                    type: string
                    description: Filter candidates by region id (comma-separated for multiple).
                filterCreatedAtFrom:
                    type: string
                    description: Filter candidates created after this RFC 3339 timestamp.
                filterCreatedAtTo:
                    type: string
                    description: Filter candidates created before this RFC 3339 timestamp.
                filterUpdatedAtFrom:
                    type: string
                    description: Filter candidates updated after this RFC 3339 timestamp.
                filterUpdatedAtTo:
                    type: string
                    description: Filter candidates updated before this RFC 3339 timestamp.
                filterConnected:
                    type: string
                    description: Filter by connected status ("true" or "false").
                filterPhone:
                    type: string
                    description: Filter by phone number (6-14 chars, may include `+`).
                include:
                    type: string
                    examples:
                        - job-applications,job-applications.stage
                    description: Comma-separated relationships to sideload, e.g. "department,locations,job-applications,job-applications.stage".
                    example: job-applications,job-applications.stage
                sort:
                    type: string
                    examples:
                        - -id
                    description: Sort order, e.g. "id" (default ascending) or "-id" (descending). Accepts any candidate attribute.
                    example: -id
                fieldsCandidates:
                    type: string
                    description: 'Sparse fieldset: comma-separated attribute names to return on candidates.'
            description: |-
                ListCandidatesRequest is the request shape for GET /v1/candidates.
                 All fields map to JSON:API query parameters. Bracketed names like `page[size]`
                 and `filter[email]` are preserved verbatim via `sebuf.http.query.name`.

                 Filters available per the Teamtailor docs: email, division, department, role,
                 locations, regions, created-at[from|to], updated-at[from|to], connected, phone.
        ListCandidatesResponse:
            type: object
            properties:
                data:
                    type: array
                    items:
                        $ref: '#/components/schemas/Candidate'
                links:
                    $ref: '#/components/schemas/Links'
                meta:
                    $ref: '#/components/schemas/Meta'
            description: ListCandidatesResponse is the JSON:API document returned by GET /v1/candidates.
        Candidate:
            type: object
            properties:
                type:
                    type: string
                    examples:
                        - candidates
                    description: JSON:API resource type, always "candidates" for this message.
                    example: candidates
                id:
                    type: string
                    examples:
                        - 12345
                    description: Teamtailor candidate ID.
                    example: 12345
                attributes:
                    $ref: '#/components/schemas/CandidateAttributes'
                relationships:
                    $ref: '#/components/schemas/CandidateRelationships'
                links:
                    $ref: '#/components/schemas/Links'
            description: |-
                Candidate is a JSON:API resource of type `candidates`.

                 Shape on the wire:
                 {
                   "type": "candidates",
                   "id": "123",
                   "attributes": { "first-name": "...", ... },
                   "relationships": { ... },
                   "links": { "self": "..." }
                 }
        CandidateAttributes:
            type: object
            properties:
                first-name:
                    type: string
                    examples:
                        - Jane
                    description: Candidate's first/given name.
                    example: Jane
                last-name:
                    type: string
                    examples:
                        - Doe
                    description: Candidate's last/family name.
                    example: Doe
                email:
                    type: string
                    examples:
                        - jane.doe@example.com
                    description: Email address.
                    example: jane.doe@example.com
                phone:
                    type: string
                    examples:
                        - +1-555-123-4567
                    description: Phone number.
                    example: +1-555-123-4567
                pitch:
                    type: string
                    description: Short pitch / candidate summary.
                sourced:
                    type: boolean
                    description: Whether the candidate was sourced (proactively added) rather than self-applied.
                tags:
                    type: array
                    items:
                        type: string
                        description: Free-form tags applied to the candidate.
                linkedin-url:
                    type: string
                    description: LinkedIn profile URL.
                linkedin-uid:
                    type: string
                    description: LinkedIn user ID extracted from `linkedin_url` (set when Teamtailor can resolve it).
                linkedin-profile:
                    type: string
                    description: LinkedIn public profile snapshot (object), present when Teamtailor has imported it.
                facebook-id:
                    type: string
                    description: Facebook user ID extracted from the candidate's Facebook profile.
                facebook-profile:
                    type: string
                    description: Facebook public profile snapshot, present when Teamtailor has imported it.
                resume:
                    type: string
                    description: URL of the most recently uploaded resume (transformed by Teamtailor).
                original-resume:
                    type: string
                    description: URL of the original uploaded resume file.
                resume_summary:
                    type: string
                    description: |-
                        Teamtailor-generated text summary of the resume (snake_case on the wire,
                         unlike other candidate attributes).
                picture:
                    type: string
                    description: URL of the candidate's profile picture.
                created-at:
                    type: string
                    examples:
                        - 2024-01-15T10:30:00Z
                    description: RFC 3339 creation timestamp.
                    example: 2024-01-15T10:30:00Z
                updated-at:
                    type: string
                    description: RFC 3339 last-update timestamp.
                internal:
                    type: boolean
                    description: True when the candidate was added internally rather than via a public form.
                referring-url:
                    type: string
                    description: Referrer page URL.
                referring-site:
                    type: string
                    description: Referrer site name.
                referred:
                    type: boolean
                    description: True when the candidate was referred by an existing user.
                connected:
                    type: boolean
                    description: True when the candidate is connected (has subscribed to updates).
                unsubscribed:
                    type: boolean
                    description: True when the candidate has unsubscribed from communications.
            description: |-
                CandidateAttributes mirrors the JSON:API `attributes` object for a candidate.
                 JSON keys on the wire use hyphens (`first-name`, `created-at`), mapped here
                 via `json_name` so protojson emits and accepts the correct names.
        CandidateRelationships:
            type: object
            properties:
                department:
                    $ref: '#/components/schemas/ToOneRelationship'
                division:
                    $ref: '#/components/schemas/ToOneRelationship'
                role:
                    $ref: '#/components/schemas/ToOneRelationship'
                regions:
                    $ref: '#/components/schemas/ToManyRelationship'
                locations:
                    $ref: '#/components/schemas/ToManyRelationship'
                custom-field-values:
                    $ref: '#/components/schemas/ToManyRelationship'
                job-applications:
                    $ref: '#/components/schemas/ToManyRelationship'
                activities:
                    $ref: '#/components/schemas/ToManyRelationship'
                questions:
                    $ref: '#/components/schemas/ToManyRelationship'
                answers:
                    $ref: '#/components/schemas/ToManyRelationship'
                uploads:
                    $ref: '#/components/schemas/ToManyRelationship'
                partner-results:
                    $ref: '#/components/schemas/ToManyRelationship'
            description: |-
                CandidateRelationships captures the JSON:API `relationships` block for a candidate.
                 Each field uses the appropriate to-one or to-many shape per Teamtailor's schema.
        ToOneRelationship:
            type: object
            properties:
                data:
                    $ref: '#/components/schemas/ResourceIdentifier'
                links:
                    $ref: '#/components/schemas/Links'
            description: |-
                ToOneRelationship is a JSON:API to-one relationship: a single resource
                 identifier under `data`, plus optional links.
        ResourceIdentifier:
            type: object
            properties:
                type:
                    type: string
                    description: Resource type, e.g. "candidates", "jobs", "departments".
                id:
                    type: string
                    description: Resource ID.
            description: |-
                ResourceIdentifier is the JSON:API `{ "type": "...", "id": "..." }` shape used
                 to reference another resource (e.g. inside relationships objects).
        Links:
            type: object
            properties:
                first:
                    type: string
                    description: URL of the first page of results.
                last:
                    type: string
                    description: URL of the last page of results.
                next:
                    type: string
                    description: URL of the next page of results, empty when on the last page.
                prev:
                    type: string
                    description: URL of the previous page of results, empty when on the first page.
                self:
                    type: string
                    description: URL of the current resource (set on individual resources, not lists).
                related:
                    type: string
                    description: URL of a related resource (set inside relationships objects).
            description: |-
                Links is the JSON:API top-level/relationship `links` object.
                 All fields are absolute URLs to other pages or related resources.
        ToManyRelationship:
            type: object
            properties:
                data:
                    type: array
                    items:
                        $ref: '#/components/schemas/ResourceIdentifier'
                links:
                    $ref: '#/components/schemas/Links'
            description: |-
                ToManyRelationship is a JSON:API to-many relationship: an array of resource
                 identifiers under `data`, plus optional links.
        Meta:
            type: object
            properties:
                record-count:
                    type: integer
                    format: int32
                    description: Total number of records matching the request (across all pages).
                page-count:
                    type: integer
                    format: int32
                    description: Total number of pages.
            description: Meta is the JSON:API top-level `meta` object returned alongside list responses.
        GetCandidateRequest:
            type: object
            properties:
                id:
                    type: string
                    examples:
                        - 12345
                    description: The candidate's id (path parameter).
                    example: 12345
                include:
                    type: string
                    examples:
                        - job-applications,job-applications.stage
                    description: |-
                        Comma-separated relationships to sideload — useful for pulling status
                         and resume context in one round-trip, e.g.
                         `job-applications,job-applications.stage,uploads`.
                    example: job-applications,job-applications.stage
                fieldsCandidates:
                    type: string
                    description: 'Sparse fieldset: comma-separated attribute names to return on candidates.'
            required:
                - id
            description: GetCandidateRequest is the request shape for GET /v1/candidates/{id}.
        GetCandidateResponse:
            type: object
            properties:
                data:
                    $ref: '#/components/schemas/Candidate'
            description: GetCandidateResponse is the JSON:API document returned by GET /v1/candidates/{id}.
        ListJobApplicationsRequest:
            type: object
            properties:
                pageSize:
                    type: integer
                    examples:
                        - 10
                    format: int32
                    description: Number of records per page (Teamtailor caps at 30).
                    example: 10
                pageNumber:
                    type: integer
                    format: int32
                    description: 1-based page number (Teamtailor uses page-number pagination on this endpoint).
                filterStageType:
                    type: string
                    examples:
                        - In process
                    description: 'Filter by current stage type: "Inbox", "In process", or "Hired".'
                    example: In process
                filterJob:
                    type: string
                    examples:
                        - 123
                    description: |-
                        Filter applications to a single job (position) id. Not in the Postman
                         table but follows the JSON:API convention used by `filter[job]` on
                         /v1/stages and /v1/uploads.
                    example: 123
                filterCandidate:
                    type: string
                    description: Filter applications by candidate id.
                filterCreatedAtFrom:
                    type: string
                    description: Filter applications created after this RFC 3339 timestamp.
                filterCreatedAtTo:
                    type: string
                    description: Filter applications created before this RFC 3339 timestamp.
                filterUpdatedAtFrom:
                    type: string
                    description: Filter applications updated after this RFC 3339 timestamp.
                filterUpdatedAtTo:
                    type: string
                    description: Filter applications updated before this RFC 3339 timestamp.
                filterChangedStageAtFrom:
                    type: string
                    description: Filter applications whose `changed-stage-at` is newer than this RFC 3339 timestamp.
                filterChangedStageAtTo:
                    type: string
                    description: Filter applications whose `changed-stage-at` is older than this RFC 3339 timestamp.
                include:
                    type: string
                    examples:
                        - stage,candidate
                    description: Comma-separated relationships to sideload, e.g. "stage,candidate,job,reject-reason".
                    example: stage,candidate
                sort:
                    type: string
                    examples:
                        - -changed-stage-at
                    description: Sort order, e.g. "-changed-stage-at" for latest-moved first.
                    example: -changed-stage-at
                fieldsJobApplications:
                    type: string
                    description: 'Sparse fieldset: comma-separated attribute names to return on job-applications.'
            description: |-
                ListJobApplicationsRequest is the request shape for GET /v1/job-applications.

                 Use this to pull a candidate's pipeline status. Sideload `stage` to resolve
                 the status to a human-readable stage name in one round-trip:

                   GET /v1/job-applications?include=stage,candidate
        ListJobApplicationsResponse:
            type: object
            properties:
                data:
                    type: array
                    items:
                        $ref: '#/components/schemas/JobApplication'
                links:
                    $ref: '#/components/schemas/Links'
                meta:
                    $ref: '#/components/schemas/Meta'
            description: ListJobApplicationsResponse is the JSON:API document returned by GET /v1/job-applications.
        JobApplication:
            type: object
            properties:
                type:
                    type: string
                    examples:
                        - job-applications
                    description: JSON:API resource type, always "job-applications" for this message.
                    example: job-applications
                id:
                    type: string
                    examples:
                        - 1
                    description: Teamtailor job-application id.
                    example: 1
                attributes:
                    $ref: '#/components/schemas/JobApplicationAttributes'
                relationships:
                    $ref: '#/components/schemas/JobApplicationRelationships'
                links:
                    $ref: '#/components/schemas/Links'
            description: |-
                JobApplication is a JSON:API resource of type `job-applications`.

                 A job application links one candidate to one job, and carries that
                 candidate's status in the hiring pipeline (current stage, rejected-at, etc.).

                 Shape on the wire:
                 {
                   "type": "job-applications",
                   "id": "1",
                   "attributes": { "cover-letter": "...", "changed-stage-at": "...", ... },
                   "relationships": { "candidate": ..., "job": ..., "stage": ..., "reject-reason": ... },
                   "links": { "self": "..." }
                 }
        JobApplicationAttributes:
            type: object
            properties:
                cover-letter:
                    type: string
                    description: The candidate-supplied cover letter (may be null).
                created-at:
                    type: string
                    description: RFC 3339 creation timestamp.
                referring-url:
                    type: string
                    description: Referrer page URL.
                referring-site:
                    type: string
                    description: Referrer site name.
                rejected-at:
                    type: string
                    description: |-
                        RFC 3339 timestamp of when the application was rejected, or empty if not rejected.
                         Pair with the `reject-reason` relationship for the cause.
                sourced:
                    type: boolean
                    description: True when the application was sourced internally rather than submitted by the candidate.
                updated-at:
                    type: string
                    description: RFC 3339 last-update timestamp.
                row-order:
                    type: integer
                    format: int32
                    description: Position of this application inside its current stage (sortable integer).
                changed-stage-at:
                    type: string
                    description: |-
                        RFC 3339 timestamp of when the application last moved between stages —
                         i.e. when the candidate's status last changed.
                send-user-notifications:
                    type: boolean
                    description: Whether to notify subscribed users when this application is created (write-only).
            description: |-
                JobApplicationAttributes mirrors the JSON:API `attributes` object on a
                 job application.
        JobApplicationRelationships:
            type: object
            properties:
                candidate:
                    $ref: '#/components/schemas/ToOneRelationship'
                job:
                    $ref: '#/components/schemas/ToOneRelationship'
                stage:
                    $ref: '#/components/schemas/ToOneRelationship'
                reject-reason:
                    $ref: '#/components/schemas/ToOneRelationship'
            description: JobApplicationRelationships captures the JSON:API `relationships` block.
        GetJobApplicationRequest:
            type: object
            properties:
                id:
                    type: string
                    examples:
                        - 1
                    description: The job application's id (path parameter).
                    example: 1
                include:
                    type: string
                    examples:
                        - stage,candidate,job
                    description: Comma-separated relationships to sideload, e.g. "stage,candidate,job".
                    example: stage,candidate,job
                fieldsJobApplications:
                    type: string
                    description: Sparse fieldset for the primary resource.
            required:
                - id
            description: GetJobApplicationRequest is the request shape for GET /v1/job-applications/{id}.
        GetJobApplicationResponse:
            type: object
            properties:
                data:
                    $ref: '#/components/schemas/JobApplication'
            description: GetJobApplicationResponse is the JSON:API document returned by GET /v1/job-applications/{id}.
        ListStagesRequest:
            type: object
            properties:
                pageSize:
                    type: integer
                    examples:
                        - 10
                    format: int32
                    description: Number of records per page (Teamtailor caps at 30).
                    example: 10
                pageNumber:
                    type: integer
                    format: int32
                    description: 1-based page number (Teamtailor uses page-number pagination on this endpoint).
                filterJob:
                    type: string
                    examples:
                        - 123
                    description: Filter stages to those belonging to a specific job.
                    example: 123
                filterStageType:
                    type: string
                    description: Filter stages by stage-type id.
                include:
                    type: string
                    examples:
                        - stage-type
                    description: Comma-separated relationships to sideload, e.g. "job-applications,stage-type".
                    example: stage-type
                sort:
                    type: string
                    examples:
                        - row-order
                    description: |-
                        Sort order. Use `row-order` when scoped to a single job to match the
                         Teamtailor pipeline ordering.
                    example: row-order
                fieldsStages:
                    type: string
                    description: 'Sparse fieldset: comma-separated attribute names to return on stages.'
            description: |-
                ListStagesRequest is the request shape for GET /v1/stages.

                 Use this to enumerate the pipeline stages available — each job has its own
                 pipeline, so usually pair with `filter[job]` to get just that job's stages.
        ListStagesResponse:
            type: object
            properties:
                data:
                    type: array
                    items:
                        $ref: '#/components/schemas/Stage'
                links:
                    $ref: '#/components/schemas/Links'
                meta:
                    $ref: '#/components/schemas/Meta'
            description: ListStagesResponse is the JSON:API document returned by GET /v1/stages.
        Stage:
            type: object
            properties:
                type:
                    type: string
                    examples:
                        - stages
                    description: JSON:API resource type, always "stages" for this message.
                    example: stages
                id:
                    type: string
                    examples:
                        - 1
                    description: Teamtailor stage id.
                    example: 1
                attributes:
                    $ref: '#/components/schemas/StageAttributes'
                relationships:
                    $ref: '#/components/schemas/StageRelationships'
                links:
                    $ref: '#/components/schemas/Links'
            description: |-
                Stage is a JSON:API resource of type `stages`.

                 A stage represents one column in a job's hiring pipeline (Inbox, Reviewing,
                 Interview, Offered, Hired, etc.). A candidate's "status" on a given job is
                 the stage their JobApplication currently points to.
        StageAttributes:
            type: object
            properties:
                name:
                    type: string
                    examples:
                        - Interview
                    description: |-
                        Human-readable stage name — e.g. "Inbox", "Interview", "Hired".
                         This is the user-facing status label.
                    example: Interview
                legacy-stage-type-name:
                    type: string
                    description: |-
                        Stage-type bucket from the legacy API: "Inbox", "In process", or "Hired".
                         Useful for grouping custom stages by lifecycle phase.
                row-order:
                    type: integer
                    format: int32
                    description: Sortable position of this stage within its job's pipeline.
                active-job-applications-count:
                    type: integer
                    format: int32
                    description: Number of active (non-rejected) job-applications currently in this stage.
                rejected-job-applications-count:
                    type: integer
                    format: int32
                    description: Number of rejected job-applications currently in this stage.
                created-at:
                    type: string
                    description: RFC 3339 creation timestamp.
                updated-at:
                    type: string
                    description: RFC 3339 last-update timestamp.
            description: StageAttributes mirrors the JSON:API `attributes` object on a stage.
        StageRelationships:
            type: object
            properties:
                job-applications:
                    $ref: '#/components/schemas/ToManyRelationship'
                triggers:
                    $ref: '#/components/schemas/ToManyRelationship'
                job:
                    $ref: '#/components/schemas/ToOneRelationship'
                stage-type:
                    $ref: '#/components/schemas/ToOneRelationship'
            description: StageRelationships captures the JSON:API `relationships` block on a stage.
        GetStageRequest:
            type: object
            properties:
                id:
                    type: string
                    examples:
                        - 1
                    description: The stage's id (path parameter).
                    example: 1
                include:
                    type: string
                    description: Comma-separated relationships to sideload, e.g. "job-applications".
                fieldsStages:
                    type: string
                    description: Sparse fieldset for the stage resource.
            required:
                - id
            description: GetStageRequest is the request shape for GET /v1/stages/{id}.
        GetStageResponse:
            type: object
            properties:
                data:
                    $ref: '#/components/schemas/Stage'
            description: GetStageResponse is the JSON:API document returned by GET /v1/stages/{id}.
