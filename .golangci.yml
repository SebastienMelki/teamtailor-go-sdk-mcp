version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - copyloopvar
    - gocritic
    - misspell
    - revive
    - unconvert
    - unparam
    - whitespace

  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
    revive:
      rules:
        - name: exported
          arguments:
            - disableStutteringCheck
    misspell:
      locale: US

  exclusions:
    generated: lax
    paths:
      - internal/gen
      - docs
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gocritic
          - unparam
      - path: cmd/apitest
        linters:
          - errcheck
          - revive

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/sebastienmelki/teamtailor-go-sdk-mcp
  exclusions:
    paths:
      - internal/gen
      - docs
